<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Jarock Digital</title>

  <link rel="stylesheet" href="style.css">

  <style>
    /* Center the success box beautifully on the page */
    .success-wrapper {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .box {
      max-width: 450px;
      width: 100%;
      padding: 50px 40px;
      border: 1px solid #1d2a3a;
      border-radius: 20px;
      background: #111a2b;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }

    .box h1 {
      color: #4aa3ff;
      font-size: 2.2rem;
      margin-bottom: 16px;
    }

    .box p {
      color: #cbd5e1;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* Style the return button to look like your main CTA buttons */
    .box .btn {
      display: inline-block;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="success-wrapper">
    <div class="box">
      <h1>Message Sent ✔</h1>
      <p>Thanks for reaching out. I’ll review your project details and get back to you soon!</p>
      <a href="/" class="btn">Go back home</a>
    </div>
  </div>
</body>
</html>
